<link rel="stylesheet" href="colors_and_type.css">
<style>
  html { scroll-behavior: smooth; }
  @media (prefers-reduced-motion: reduce) { html { scroll-behavior: auto; } }
  html, body { margin: 0; background: var(--pp-page); color: var(--pp-fg); }
  body { font-family: var(--pp-font-body); -webkit-font-smoothing: antialiased; overflow-x: hidden; }
  * { box-sizing: border-box; }
  ::selection { background: var(--pp-acid); color: #030303; }

  /* ---- entrance: per-character rise (hero stagger) ---- */
  @keyframes ppRise { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
  .pp-rise { display: inline-block; animation: ppRise .7s cubic-bezier(.44,0,.16,1) both; }

  /* Solution capability auto-cycle progress bar */
  @keyframes capProgressFill { from { transform: scaleX(0); } to { transform: scaleX(1); } }
  @media (prefers-reduced-motion: reduce) { .cap-progress { animation: none !important; transform: scaleX(0); } }

  /* hand-phone screen swap fade */
  @keyframes handScreenFade { from { opacity: 0; } to { opacity: 1; } }
  .hand-screen-fade { animation: handScreenFade .5s var(--pp-ease, cubic-bezier(.44,0,.16,1)) both; }
  @media (prefers-reduced-motion: reduce) { .hand-screen-fade { animation: none; } }

  /* hand-phone carousel progress bar fill */
  @keyframes handBarRun { from { transform: scaleX(0); } to { transform: scaleX(1); } }
  .hand-bar-run { animation: handBarRun linear both; }
  @media (prefers-reduced-motion: reduce) { .hand-bar-run { animation: none; transform: scaleX(1); } }

  /* hand-phone carousel: new screen slides in from the right over the previous */
  @keyframes handSlideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
  .hand-slide-in { animation: handSlideIn .55s cubic-bezier(.44,0,.16,1) both; }
  @media (prefers-reduced-motion: reduce) { .hand-slide-in { animation: none; } }

  /* ---- reveal-on-scroll ---- */
  .reveal { opacity: 0; transform: translateY(38px); transition: opacity .8s cubic-bezier(.44,0,.16,1), transform .8s cubic-bezier(.44,0,.16,1); will-change: opacity, transform; }
  .reveal.in { opacity: 1; transform: none; }
  .reveal-l { opacity: 0; transform: translateX(-44px); transition: opacity .8s cubic-bezier(.44,0,.16,1), transform .8s cubic-bezier(.44,0,.16,1); }
  .reveal-l.in { opacity: 1; transform: none; }
  .reveal-r { opacity: 0; transform: translateX(44px); transition: opacity .8s cubic-bezier(.44,0,.16,1), transform .8s cubic-bezier(.44,0,.16,1); }
  .reveal-r.in { opacity: 1; transform: none; }
  .reveal-scale { opacity: 0; transform: scale(.94); transition: opacity .8s cubic-bezier(.44,0,.16,1), transform .8s cubic-bezier(.44,0,.16,1); }
  .reveal-scale.in { opacity: 1; transform: none; }

  @media (prefers-reduced-motion: reduce) {
    .pp-rise { animation: none; }
    .reveal, .reveal-l, .reveal-r, .reveal-scale { opacity: 1 !important; transform: none !important; transition: none; }
  }

  /* ---- scrollbar ---- */
  ::-webkit-scrollbar { width: 10px; }
  ::-webkit-scrollbar-track { background: #060606; }
  ::-webkit-scrollbar-thumb { background: #222; border-radius: 10px; }
  ::-webkit-scrollbar-thumb:hover { background: #2e2e2e; }

  section { scroll-margin-top: 110px; }

  /* marquee for the borderless strip */
  @keyframes ppMarquee { from { transform: translateX(0); } to { transform: translateX(-50%); } }
  .pp-marquee { display: inline-flex; white-space: nowrap; animation: ppMarquee 142s linear infinite; }
  @media (prefers-reduced-motion: reduce) { .pp-marquee { animation: none; } }

  /* partner / ecosystem strip marquee */
  @keyframes ppPartnerMarquee { from { transform: translateX(0); } to { transform: translateX(-50%); } }
  .pp-partner-marquee { animation: ppPartnerMarquee 38s linear infinite; }
  @media (prefers-reduced-motion: reduce) { .pp-partner-marquee { animation: none; } }

  /* Partner strip — scale logos and chips up on large monitors so the rail
     doesn't look anaemic on Studio Display. img heights are inline so we
     override with !important. Chip padding gets a wider clamp ceiling.
     Global 0.85 (-15%) trim applied below per user request. */
  .pp-partner-marquee img { transform: scale(0.85); transform-origin: center; }
  @media (min-width: 1600px) {
    .pp-partner-marquee > span { height: 80px !important; padding: 0 clamp(36px, 3.5vw, 72px) !important; }
    .pp-partner-marquee img { height: calc(var(--pp-logo-h, 22px) * 1.275) !important; transform: none; }
  }
  @media (min-width: 2000px) {
    .pp-partner-marquee > span { height: 100px !important; padding: 0 clamp(44px, 4vw, 96px) !important; }
    /* height already includes -15% (multiplier 1.275); scale stays at original 1.85 */
    .pp-partner-marquee img { transform: scale(1.85); transform-origin: center; }
  }

  /* DS pill button hover / press */
  .pp-pill-btn-dyn:hover { filter: brightness(1.12); }
  .pp-pill-btn-dyn:active { transform: scale(.95); filter: brightness(.85); transition-duration: .08s; }

  /* animated chart line draw */
  .pp-draw { stroke-dasharray: var(--len); stroke-dashoffset: var(--len); transition: stroke-dashoffset 1.6s cubic-bezier(.44,0,.16,1); }
  .pp-draw.in { stroke-dashoffset: 0; }

  /* grow-up bars */
  .pp-bar { transform: scaleY(0); transform-origin: bottom; transition: transform 1.1s cubic-bezier(.44,0,.16,1); }
  .pp-bar.in { transform: scaleY(1); }

  /* ---- Geography map markers ---- */
  @keyframes geoPing {
    0%   { transform: scale(.5); opacity: .9; }
    70%  { opacity: 0; }
    100% { transform: scale(3.4); opacity: 0; }
  }
  .geo-ping { animation: geoPing 2.4s cubic-bezier(.16,.6,.4,1) infinite; }
  @keyframes geoCorePulse {
    0%, 100% { transform: scale(1); }
    50%      { transform: scale(1.18); }
  }
  .geo-core { animation: geoCorePulse 2.4s ease-in-out infinite; }
  @media (prefers-reduced-motion: reduce) {
    .geo-ping { animation: none; opacity: 0; }
    .geo-core { animation: none; }
  }

  /* ---- section hero ---- */
  .pp-ghostnum {
    position: absolute; pointer-events: none; user-select: none; z-index: 0;
    font-family: var(--pp-font-display); font-weight: 800; font-stretch: 125%;
    font-variation-settings: 'wght' 800, 'wdth' 125;
    font-size: clamp(200px, 32vw, 480px); line-height: .78; letter-spacing: -.05em;
    color: transparent; -webkit-text-stroke: 1px #131313;
    opacity: 0; transform: translateY(40px);
    transition: opacity 1.1s ease, transform 1.2s cubic-bezier(.44,0,.16,1);
  }
  .pp-ghostnum.in { opacity: 1; transform: none; }
  .pp-sec-glow {
    position: absolute; inset: 0; pointer-events: none; z-index: 0;
    background: radial-gradient(68% 58% at 50% 88%, rgba(204,255,0,.10), transparent 70%);
  }
  /* source link in tables (Karta dark style - not browser blue) */
  .src-link { color: var(--pp-fg-3); transition: color .2s; }
  .src-link:hover { color: var(--pp-acid); text-decoration-color: var(--pp-acid) !important; }
  /* inline text link (white, acid underline + hover) */
  .inl-link { color: #fafafa; text-decoration: underline; text-decoration-color: rgba(204,255,0,.5); text-underline-offset: 2px; transition: color .2s; }
  .inl-link:hover { color: var(--pp-acid); text-decoration-color: var(--pp-acid); }
  /* per-word stagger title */
  .pp-stitle .w { display: inline-block; opacity: 0; transform: translateY(34px); will-change: transform, opacity; }
  .pp-stitle.in .w { animation: ppRise .62s cubic-bezier(.44,0,.16,1) both; }

  /* divider ghost number - slides in from the right with a slight scale */
  @keyframes secNumIn { from { opacity: 0; transform: translateX(64px) scale(1.09); } to { opacity: .7; transform: translateX(0) scale(1); } }
  .pp-ghostnum.sec-num { opacity: 0; }
  .pp-ghostnum.sec-num.in { animation: secNumIn 1.15s cubic-bezier(.22,.61,.36,1) .04s both; }

  @media (prefers-reduced-motion: reduce) {
    .pp-ghostnum { opacity: 1 !important; transform: none !important; }
    .pp-ghostnum.sec-num, .pp-ghostnum.sec-num.in { animation: none !important; opacity: .7 !important; }
    .pp-stitle .w { opacity: 1 !important; transform: none !important; animation: none !important; }
  }

  /* ---- responsive ---- */
  @media (max-width: 900px) {
    section { padding-left: 18px !important; padding-right: 18px !important; }
    .grid-3, .grid-4, .grid-5 { grid-template-columns: repeat(2, 1fr) !important; }
    .solution-grid, .trac-grid, .founder-grid, .hero-split-grid { grid-template-columns: 1fr !important; }
    .market-row { grid-template-columns: 1fr !important; gap: 10px !important; }
    .ratio-block { flex-direction: column !important; align-items: flex-start !important; gap: 20px !important; }
    .ratio-rule { display: none !important; }
    .roadmap-row { grid-template-columns: 1fr !important; gap: 10px !important; }
    .hand-pin { position: relative !important; top: auto !important; right: auto !important; transform: none !important; margin: 32px auto 0 !important; display: flex !important; justify-content: center !important; }
    .hand-pin > div { height: 64vh !important; }
    .hand-col { max-width: 100% !important; }
    .solv2-row { flex-direction: column !important; align-items: flex-start !important; gap: 22px !important; }
    .solv2-row > div:first-child { flex: none !important; width: 100% !important; max-width: 100% !important; }
    .roadmap-row span[style*="right"], .roadmap-row > span:last-child { text-align: left !important; }
    .roadmap-c-row { grid-template-columns: 1fr !important; gap: 24px !important; }
    .vision-row { grid-template-columns: 1fr !important; gap: 16px !important; }
    .hero-media { display: none !important; }
  }
  @media (max-width: 560px) {
    .grid-2, .grid-3, .grid-4, .grid-5 { grid-template-columns: 1fr !important; }
    /* Projection table: stack metric label above the 3 scenario columns on mobile */
    .proj-head, .proj-row { grid-template-columns: 1fr 1fr 1fr !important; padding: 14px 16px !important; gap: 4px 8px; font-size: 12px; }
    .proj-head > *:first-child, .proj-row > *:first-child { grid-column: 1 / -1 !important; text-align: left !important; padding-bottom: 4px; }
    .proj-row > *:not(:first-child) { text-align: center !important; }
    .proj-head > *:not(:first-child) { text-align: center !important; font-size: 10px !important; }
    .flow-row { flex-direction: column !important; }
    .flow-arrow { transform: rotate(90deg); }
    .investor-form-grid { grid-template-columns: 1fr !important; }
  }

  /* Hero description — single line on desktop, wraps on mobile */
  .hero-desc { white-space: nowrap; }
  @media (max-width: 900px) {
    .hero-desc { white-space: normal !important; }
    /* H1 fits the narrow column — lower the clamp floor */
    #mission h1 { font-size: clamp(32px, 8.4vw, 56px) !important; }
    /* phone image overlaps the stacked text on mobile — hide it */
    #mission img[alt*="Karta app"] { display: none !important; }
    /* keep hero full-bleed on mobile — generic `section { padding: 0 18px }`
       rule would otherwise insert side bars on the first slide */
    #mission { padding: 0 !important; }
    /* card padding shrinks so content has more room */
    #mission > div { padding: clamp(20px, 5vw, 32px) 20px !important; }
  }
  /* Investor form: focus state */
  .investor-form-grid input:focus, .investor-form-grid select:focus, .investor-form-grid textarea:focus {
    border-color: var(--pp-acid) !important;
    background: var(--pp-card) !important;
  }
  .investor-form-grid select { appearance: none; -webkit-appearance: none; background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8'><path d='M1 1l5 5 5-5' fill='none' stroke='%23a0a0a0' stroke-width='1.6' stroke-linecap='round' stroke-linejoin='round'/></svg>"); background-repeat: no-repeat; background-position: right 16px center; padding-right: 40px !important; }

  /* ---- How-it-works architecture diagram ---- */
  .arch-grid { display: grid; grid-template-columns: 1fr 90px 1.04fr 90px 1.16fr; grid-template-rows: 1fr auto; column-gap: 0; row-gap: 18px; align-items: stretch; }
  .arch-foot { display: grid; grid-template-columns: 1fr 90px 1.04fr 90px 1.16fr; column-gap: 0; }
  .arch-arrowsvg { display: inline-flex; transition: transform .3s var(--pp-ease, cubic-bezier(.44,0,.16,1)); }
  @media (max-width: 980px) {
    .arch-grid, .arch-foot { grid-template-columns: 1fr !important; }
    .arch-grid > *, .arch-foot > * { grid-column: 1 / -1 !important; grid-row: auto !important; }
    .arch-card { min-height: 0 !important; }
    .arch-arrow { padding: 10px 0 !important; min-height: 0 !important; }
    .arch-arrowsvg { transform: rotate(90deg); }
    .arch-foot > * { padding: 0 !important; }
    .hiw-b { flex-direction: column !important; gap: 36px !important; }
  }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
